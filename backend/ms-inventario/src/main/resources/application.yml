server:
  port: 8081

spring:
  application:
    name: ms-inventario
  datasource:
    # URL por defecto para docker-compose. Si se ejecuta local sin docker, se puede sobreescribir.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_inventario}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Solo para desarrollo. En produccion se usa Flyway o Liquibase.
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
